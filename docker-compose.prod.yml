# ============================================================================
# CHATBOT CORE — Production Docker Compose (Independent Stack)
# ============================================================================
# Nginx (static files + SSL proxy) + FastAPI (4 workers) + PostgreSQL 18 (pgvector)
# Sessions: Upstash Redis (external, TLS) — configured via REDIS_URL in .env
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: chatbot_db
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      POSTGRES_USER: ${DB_USER:-shared}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shared_secret}
      POSTGRES_DB: ${DB_NAME:-chatbot}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-shared} -d ${DB_NAME:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          memory: 256M

  # ── Nginx: Static files + Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: chatbot_nginx
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/tenant:/usr/share/nginx/html/tenant:ro
      - ./frontend/admin:/usr/share/nginx/html/admin:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      chatbot_net:
        aliases:
          - bot
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

  # ── FastAPI: Backend API ─────────────────────────────────────────────────
  api:
    build:
      context: ./core
      dockerfile: Dockerfile
      target: production
    container_name: chatbot_api
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=postgresql://${DB_USER:-shared}:${DB_PASSWORD:-shared_secret}@db:5432/${DB_NAME:-chatbot}
      - ADK_DISABLE_JSON_SCHEMA_FOR_FUNC_DECL=true
    networks:
      - chatbot_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          memory: 1024M

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - chatbot_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  db_data:
  nginx_cache:
  nginx_run:

networks:
  chatbot_net:
    driver: bridge
