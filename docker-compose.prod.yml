# ============================================================================
# CHATBOT CORE — Production Docker Compose
# ============================================================================
# Nginx (static files + reverse proxy) + FastAPI (4 workers) + PostgreSQL
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  redis:
    image: redis:7.4-alpine
    container_name: chatbot_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    stop_grace_period: 30s
    volumes:
      - redis_data:/data
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── Nginx: Static files + Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: chatbot_nginx
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/tenant:/usr/share/nginx/html/tenant:ro
      - ./frontend/admin:/usr/share/nginx/html/admin:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

  # ── FastAPI: Backend API ─────────────────────────────────────────────────
  api:
    build:
      context: ./core
      dockerfile: Dockerfile
      target: production
    container_name: chatbot_api
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - chatbot_net
      - booking-titanium-wm_default
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M

  # ── Init DB: Creates 'chatbot' database if not exists ─────────────────
  init_db:
    image: postgres:17-alpine
    container_name: chatbot_init_db
    restart: "no"
    environment:
      - PGPASSWORD=windmill
    command: >
      sh -c "
      psql -h booking-titanium-wm-db-1 -U windmill -d windmill -tc \"SELECT 1 FROM pg_database WHERE datname = 'chatbot'\" | grep -q 1 ||
      psql -h booking-titanium-wm-db-1 -U windmill -d windmill -c 'CREATE DATABASE chatbot;'
      "
    networks:
      - booking-titanium-wm_default
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
  nginx_cache:
  nginx_run:

networks:
  chatbot_net:
    driver: bridge
  booking-titanium-wm_default:
    external: true
