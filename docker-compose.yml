version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  redis:
    image: redis:7.4-alpine
    container_name: chatbot_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  api:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: chatbot_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ADK_DISABLE_JSON_SCHEMA_FOR_FUNC_DECL=true
    volumes:
      - chatbot_venv:/app/.venv
    networks:
      - chatbot_net
    depends_on:
      - redis
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: chatbot_nginx
    restart: unless-stopped
    ports:
      - "7080:7080"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/tenant:/usr/share/nginx/html/tenant:ro
      - ./frontend/admin:/usr/share/nginx/html/admin:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - api
    networks:
      chatbot_net:
        aliases:
          - bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - chatbot_net
    logging: *default-logging

  certbot:
    image: certbot/certbot
    container_name: chatbot_certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - chatbot_net

volumes:
  chatbot_venv:
  redis_data:
  nginx_cache:
  nginx_run:

networks:
  chatbot_net:
    driver: bridge
