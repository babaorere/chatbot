x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: unless-stopped
    stop_grace_period: 10s
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          memory: 64M

  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: chatbot_db
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-shared}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${DB_NAME:-chatbot}
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - chatbot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-shared} -d ${DB_NAME:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    secrets:
      - db_password
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          memory: 256M

  api:
    build:
      context: ./core
      dockerfile: Dockerfile
      target: development
    container_name: chatbot_api
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    ports:
      - "8001:8000"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=postgresql://${DB_USER:-shared}:${DB_PASSWORD:-shared_secret}@db:5432/${DB_NAME:-chatbot}
      - ARQ_ENABLED=true
      - ADK_DISABLE_JSON_SCHEMA_FOR_FUNC_DECL=true
      - RESET_DEMO_CATALOG_ON_START=true
    volumes:
      - ./core:/app
      - ./nginx.conf:/nginx.conf:ro
    networks:
      - chatbot_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    secrets:
      - jwt_secret
      - telegram_bot_token
      - admin_api_key
      - db_password
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          memory: 512M

  arq_worker:
    build:
      context: ./core
      dockerfile: Dockerfile
      target: development
    container_name: chatbot_arq_worker
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=postgresql://${DB_USER:-shared}:${DB_PASSWORD:-shared_secret}@db:5432/${DB_NAME:-chatbot}
      - ARQ_ENABLED=true
    command: ["arq", "workers.arq_worker.WorkerSettings"]
    volumes:
      - ./core:/app
    networks:
      - chatbot_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging
    secrets:
      - jwt_secret
      - telegram_bot_token
      - admin_api_key
      - db_password
    healthcheck:
      test: ["CMD", "python", "-c", "import os,redis; r=redis.from_url(os.environ['REDIS_URL']); assert r.get('chatbot:jobs:health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    container_name: chatbot_nginx
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "7080:7080"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/tenant:/usr/share/nginx/html/tenant:ro
      - ./frontend/admin:/usr/share/nginx/html/admin:ro
      - nginx_cache:/var/cache/nginx
      - nginx_run:/var/run
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
    networks:
      chatbot_net:
        aliases:
          - bot
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

  tunnel:
    image: cloudflare/cloudflared:2026.1.2
    container_name: cloudflare_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - chatbot_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  certbot:
    image: certbot/certbot
    container_name: chatbot_certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - chatbot_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

volumes:
  db_data:
  redis_data:
  nginx_cache:
  nginx_run:

networks:
  chatbot_net:
    driver: bridge

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  telegram_bot_token:
    file: ./secrets/telegram_bot_token.txt
  admin_api_key:
    file: ./secrets/admin_api_key.txt
  db_password:
    file: ./secrets/db_password.txt
