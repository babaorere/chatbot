# ── Rate Limiting Zones ─────────────────────────────────────────────────────
# Chat API: 10 requests/minute per IP (prevents OpenRouter abuse)
limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;

# Admin endpoints: 5 requests/minute per IP (prevents brute force)
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/m;

# General API: 30 requests/minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# ── Upstream ────────────────────────────────────────────────────────────────
upstream botilleria_api {
    server api:8000;
    keepalive 32;
}

