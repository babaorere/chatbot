# ── Main Server ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen 7080;
    # listen 443 ssl http2;  # Uncomment after SSL setup
    # server_name botilleria.tu-dominio.com;

    # ── SSL Configuration (uncomment after certbot setup) ───────────────────
    # ssl_certificate /etc/letsencrypt/live/botilleria.tu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/botilleria.tu-dominio.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_timeout 1d;
    # ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;

    # ── Tenant Portal ───────────────────────────────────────────────────────
    location /tenant/ {
        alias /usr/share/nginx/html/tenant/;
        try_files $uri $uri/ /tenant/index.html;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ── Admin Portal ────────────────────────────────────────────────────────
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;

        # Rate limit admin endpoints
        limit_req zone=admin_limit burst=3 nodelay;

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ── Chat API (rate limited) ─────────────────────────────────────────────
    location /chat {
        limit_req zone=chat_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://botilleria_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── SSE Streaming (no rate limit, no buffering) ─────────────────────────
    location /chat/stream {
        proxy_pass http://botilleria_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        add_header X-Accel-Buffering no;
        add_header Cache-Control no-cache;
        add_header Connection keep-alive;
    }

    # ── General API (rate limited) ──────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://botilleria_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ── Health Check (no rate limit, no logging) ────────────────────────────
    location /health {
        proxy_pass http://botilleria_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── Deny Hidden Files ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Custom Error Pages ──────────────────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type application/json;
        return 429 '{"error": "Too many requests. Please try again later."}';
    }
}
