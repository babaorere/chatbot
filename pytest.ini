[pytest]
asyncio_mode = auto
testpaths = core/tests tests
pythonpath = core
cache_dir = /tmp/chatbot_core_pytest_cache
filterwarnings =
    ignore:BaseAgentConfig is deprecated and will be removed in future versions\.:DeprecationWarning
    ignore:Using `httpx` with `starlette\.testclient` is deprecated; install `httpx2` instead\.:starlette.exceptions.StarletteDeprecationWarning
markers =
    integration: tests that require a running API service or external process
