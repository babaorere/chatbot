groups:
  # ── API Health Alerts ──────────────────────────────────────────────────────
  - name: chatbot_api_health
    rules:
      - alert: ChatbotAPIDown
        expr: up{job="chatbot_api"} == 0
        for: 1m
        labels:
          severity: critical
          team: chatbot
        annotations:
          summary: "Chatbot API is down"
          description: "The chatbot API at {{ $labels.instance }} has been unreachable for over 1 minute."
          runbook: "Check container logs: docker logs chatbot_api"

      - alert: ChatbotAPISlowResponse
        expr: probe_duration_seconds{job="chatbot_api"} > 5
        for: 5m
        labels:
          severity: warning
          team: chatbot
        annotations:
          summary: "Chatbot API slow responses"
          description: "API response time is {{ $value }}s (threshold: 5s) for the last 5 minutes."
          runbook: "Check OpenRouter latency, database query performance, and memory usage."

      - alert: ChatbotAPIHighErrorRate
        expr: rate(http_requests_total{job="chatbot_api", status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: chatbot
        annotations:
          summary: "Chatbot API high error rate"
          description: "Error rate is {{ $value }} errors/sec over the last 5 minutes."
          runbook: "Check API logs for stack traces. Verify database connectivity."

  # ── Nginx Alerts ───────────────────────────────────────────────────────────
  - name: chatbot_nginx_health
    rules:
      - alert: ChatbotNginxDown
        expr: up{job="chatbot_nginx"} == 0
        for: 1m
        labels:
          severity: critical
          team: chatbot
        annotations:
          summary: "Chatbot Nginx is down"
          description: "Nginx at {{ $labels.instance }} has been unreachable for over 1 minute."
          runbook: "Check container: docker logs chatbot_nginx. Verify ports 80/443."

      - alert: ChatbotNginxHigh4xxRate
        expr: rate(nginx_http_requests_total{status=~"4.."}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: chatbot
        annotations:
          summary: "Chatbot Nginx high 4xx rate"
          description: "4xx error rate is {{ $value }} req/sec. Possible misconfiguration or abuse."
          runbook: "Check Nginx access logs for patterns. Verify rate limiting is active."

  # ── Database Alerts ────────────────────────────────────────────────────────
  - name: chatbot_database_health
    rules:
      - alert: ChatbotDatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          team: chatbot
        annotations:
          summary: "PostgreSQL database is down"
          description: "PostgreSQL at {{ $labels.instance }} has been unreachable for over 1 minute."
          runbook: "Check database container: docker logs booking-titanium-wm-db-1. Verify disk space."

      - alert: ChatbotDatabaseHighConnections
        expr: pg_stat_activity_count{datname="chatbot"} > 50
        for: 5m
        labels:
          severity: warning
          team: chatbot
        annotations:
          summary: "Chatbot database high connection count"
          description: "Database has {{ $value }} active connections to chatbot DB."
          runbook: "Check for connection leaks. Verify API worker count and pool settings."

      - alert: ChatbotDatabaseLongRunningQueries
        expr: pg_stat_activity_max_tx_duration{datname="chatbot"} > 30
        for: 5m
        labels:
          severity: warning
          team: chatbot
        annotations:
          summary: "Chatbot database long-running queries"
          description: "Queries running longer than 30s detected on chatbot DB."
          runbook: "Check pg_stat_activity for blocking queries. Review FTS index health."

  # ── Backup Alerts ──────────────────────────────────────────────────────────
  - name: chatbot_backup_health
    rules:
      - alert: ChatbotBackupMissing
        expr: absent(chatbot_backup_last_success_timestamp) or (time() - chatbot_backup_last_success_timestamp) > 172800
        for: 1h
        labels:
          severity: critical
          team: chatbot
        annotations:
          summary: "Chatbot backup is missing or stale"
          description: "No successful backup in the last 48 hours."
          runbook: "Check backup cron job. Run manual backup: ./scripts/backup.sh full"

      - alert: ChatbotBackupFailed
        expr: chatbot_backup_last_status == 1
        for: 0m
        labels:
          severity: critical
          team: chatbot
        annotations:
          summary: "Chatbot backup failed"
          description: "The most recent backup attempt failed."
          runbook: "Check backup logs: /opt/chatbot/logs/backup_*.log"

  # ── Disk Space Alerts ──────────────────────────────────────────────────────
  - name: chatbot_disk_health
    rules:
      - alert: ChatbotDiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 5m
        labels:
          severity: warning
          team: chatbot
        annotations:
          summary: "Chatbot disk space low"
          description: "Less than 10% disk space remaining on {{ $labels.instance }}."
          runbook: "Clean up old backups, logs, and Docker images. Check /opt/chatbot/backups."

      - alert: ChatbotDiskSpaceCritical
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.05
        for: 5m
        labels:
          severity: critical
          team: chatbot
        annotations:
          summary: "Chatbot disk space critical"
          description: "Less than 5% disk space remaining on {{ $labels.instance }}."
          runbook: "URGENT: Clean up immediately. Remove old backups, prune Docker: docker system prune -af"
