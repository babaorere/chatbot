global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # ── Chatbot API (health endpoint as basic metric) ───────────────────────
  - job_name: "chatbot_api"
    metrics_path: "/health"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "chatbot_core_api:8000"
        labels:
          service: "chatbot"
          env: "production"

  # ── Nginx (via stub_status if enabled) ─────────────────────────────────────
  - job_name: "chatbot_nginx"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "chatbot_nginx:80"
        labels:
          service: "nginx"
          env: "production"

  # ── PostgreSQL (via postgres_exporter if deployed) ─────────────────────────
  - job_name: "postgres"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "booking-titanium-wm-db-1:9187"
        labels:
          service: "postgres"
          env: "production"

  # ── Prometheus Self-Monitoring ─────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
        labels:
          service: "prometheus"

  # ── Alertmanager ───────────────────────────────────────────────────────────
  - job_name: "alertmanager"
    static_configs:
      - targets:
          - "alertmanager:9093"
        labels:
          service: "alertmanager"

  # ── Grafana ────────────────────────────────────────────────────────────────
  - job_name: "grafana"
    static_configs:
      - targets:
          - "grafana:3000"
        labels:
          service: "grafana"
