global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'null'  # Default: discard alerts

receivers:
  - name: 'null'
    # Discard all alerts by default - configure as needed
    # For email, slack, webhook, etc.:
    # - name: 'email'
    #   email_configs:
    #     - to: 'alerts@tu-dominio.com'
    #       from: 'chatbot@tu-dominio.com'
    #       smarthost: 'smtp.gmail.com:587'
    #       auth_username: 'alerts@tu-dominio.com'
    #       auth_password: '${SMTP_PASSWORD}'
    #       send_resolved: true

inhibit_rules:
  # Suppress lower severity alerts when higher severity exists
  - source_match:
      severity: 'critical'
    target_match:
      severity: ['warning', 'info']
    equal: ['alertname', 'job', 'instance']

  # Suppress warnings when info exists
  - source_match:
      severity: 'warning'
    target_match:
      severity: ['info']
    equal: ['alertname', 'job', 'instance']