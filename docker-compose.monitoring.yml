# ============================================================================
# CHATBOT CORE — Monitoring Stack (Prometheus + Grafana + Alertmanager)
# ============================================================================
# Run alongside production: docker-compose -f docker-compose.monitoring.yml up -d
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  # ── Prometheus: Metrics Collection ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: chatbot_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
      - "--web.listen-address=:9090"
    expose:
      - "9090"
    networks:
      - chatbot_net
      - booking-titanium-wm_default
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Grafana: Dashboards & Visualization ────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: chatbot_grafana
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-chatbot_monitor}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-/monitoring}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - chatbot_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── Alertmanager: Alert Routing ────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: chatbot_alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    expose:
      - "9093"
    networks:
      - chatbot_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  chatbot_net:
    driver: bridge
  booking-titanium-wm_default:
    external: true
