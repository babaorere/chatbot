name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: chatbot
          POSTGRES_USER: shared
          POSTGRES_PASSWORD: shared_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shared -d chatbot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: core
    env:
      DATABASE_URL: postgresql://shared:shared_secret@127.0.0.1:5432/chatbot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff check
        run: |
          ruff check .
          ruff format --check . --exclude tests

      - name: Run tests
        run: pytest -q tests/

  # ── Build Docker Images ──────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./core
          push: false
          tags: chatbot-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Nginx image
        run: |
          docker build -f Dockerfile.nginx -t chatbot-nginx:latest .

  # ── Deploy to VPS ────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy configuration
        id: deploy_config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Deploy target detected."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped: VPS secrets are not configured for this repository yet."
          fi

      - name: Skip deploy
        if: steps.deploy_config.outputs.ready != 'true'
        run: echo "No VPS configured. CI finished without remote deployment."

      - name: Deploy to VPS
        if: steps.deploy_config.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/chatbot
            git pull
            chmod +x deploy.sh
            ./deploy.sh production
