# ============================================================================
# CHATBOT CORE — Docker Compose
# ============================================================================
# Servicio FastAPI de negocio single-tenant + PostgreSQL local/compartido
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  redis:
    image: redis:7.4-alpine
    container_name: chatbot_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - chatbot_redis_data:/data
    networks:
      - booking-titanium-wm_default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  chatbot_api:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: chatbot_core_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - ./core:/app
      - chatbot_venv:/app/.venv
    networks:
      - booking-titanium-wm_default
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 1024M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging: *default-logging

  # ── Init DB: crea la base de datos 'chatbot' en el PostgreSQL de Windmill ──
  chatbot_init_db:
    image: postgres:17-alpine
    container_name: chatbot_init_db
    restart: "no"
    environment:
      - PGPASSWORD=windmill
    command: >
      sh -c "
      psql -h booking-titanium-wm-db-1 -U windmill -d windmill -tc \"SELECT 1 FROM pg_database WHERE datname = 'chatbot'\" | grep -q 1 ||
      psql -h booking-titanium-wm-db-1 -U windmill -d windmill -c 'CREATE DATABASE chatbot;'
      "
    networks:
      - booking-titanium-wm_default
    depends_on:
      - chatbot_api

volumes:
  chatbot_venv:
  chatbot_redis_data:

networks:
  booking-titanium-wm_default:
    external: true
